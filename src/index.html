<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tela de Cadastro - ADS</title>
</head>

<body>
    <header>
        <main>
            <h1>Criar Conta</h1>
            <label>
                <p>Nome<span>*</span></p>
                <input class="input-name" type="text" placeholder="  Digite o seu nome">
            </label>
            <label>
                <p>E-mail<span>*</span></p>
                <input class="input-email" type="text" placeholder="  Digite o seu E-mail">
            </label>
            <label>
                <p>Senha<span>*</span></p>
                <input class="input-senha" type="text" placeholder="  Digite a sua senha">
            </label>
            <label>
                <p>Confrimar senha<span>*</span></p>

                <input class="input-confirmar-senha" type="text" placeholder="  Confirma a sua senha">
            </label>

            <button class="button-cadastrar">Cadastrar</button>
        </main>
    </header>
</body>
<script src="script.js"></script>

</html>
